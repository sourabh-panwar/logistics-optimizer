<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Deliveries</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 30px; }
        .nav { margin-bottom: 20px; }
        .nav a { background: #333; color: white; padding: 10px; text-decoration: none; border-radius: 4px; }
        table { width: 100%; background: white; border-collapse: collapse; }
        th, td { padding: 15px; border: 1px solid #ddd; text-align: left; }
        button { background: #28a745; color: white; border: none; padding: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="nav"><a href="welcome.html">← Dashboard</a></div>
    <h2>Active Deliveries</h2>
    
    <table>
        <thead><tr><th>Sequence</th><th>Action</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        function loadActive() {
            let active = JSON.parse(localStorage.getItem("activeRoutes") || "[]");
            let tbody = document.getElementById("table-body");
            tbody.innerHTML = "";
            active.forEach((seq, index) => {
                tbody.innerHTML += `<tr><td>${seq}</td><td><button onclick="complete(${index})">Mark Complete</button></td></tr>`;
            });
        }

        function complete(index) {
            let active = JSON.parse(localStorage.getItem("activeRoutes") || "[]");
            let completed = JSON.parse(localStorage.getItem("completedRoutes") || "[]");
            
            // Move from active to completed array
            let finishedRoute = active.splice(index, 1)[0];
            completed.push(finishedRoute);
            
            localStorage.setItem("activeRoutes", JSON.stringify(active));
            localStorage.setItem("completedRoutes", JSON.stringify(completed));
            loadActive(); // Refresh the table
        }
        
        loadActive(); // Run on page load
    </script>
</body>
</html>
